      summary: Delete a grocery product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /grocery/products/{id}/stock:
    patch:
      operationId: adjustGroceryProductStock
      tags: [grocery]
      summary: Adjust stock quantity (delta)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockAdjustBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroceryProduct"

  /grocery/suppliers:
    get:
      operationId: listGrocerySuppliers
      tags: [grocery]
      summary: List grocery suppliers
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of suppliers
          content:
            application/json:
              schema:
                type: array
