          schema:
            type: integer
        - name: date
          in: query
          schema:
            type: string
        - name: staffId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BeautyAppointment"
    post:
      operationId: createBeautyAppointment
      tags: [beauty]
      summary: Create an appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBeautyAppointmentBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BeautyAppointment"

  /beauty/stats:
    get:
      operationId: getBeautyStats
      tags: [beauty]
      summary: Beauty salon daily stats
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BeautyStats"

  # ─── GROCERY ─────────────────────────────────────────────
  /grocery/products:
    get:
      operationId: listGroceryProducts
      tags: [grocery]
      summary: List grocery products
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
        - name: lowStock
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroceryProduct"
    post:
      operationId: createGroceryProduct
      tags: [grocery]
      summary: Create a grocery product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroceryProductBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroceryProduct"

  /grocery/products/{id}:
    put:
      operationId: updateGroceryProduct
      tags: [grocery]
      summary: Update a grocery product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroceryProductBody"
