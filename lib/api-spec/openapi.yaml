components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ─── AUTH ─────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [SUPER_ADMIN, OWNER, MANAGER, STAFF]
        businessId:
          type: integer
          nullable: true
        createdAt:
          type: string
      required: [id, email, name, role, createdAt]

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required: [user, token]

    # ─── SUPER ADMIN ──────────────────────────────────────
    SuperAdminStats:
      type: object
      properties:
        totalBusinesses:
          type: integer
        activeBusinesses:
          type: integer
        monthlyRevenue:
          type: number
        totalTransactionsToday:
          type: integer
        newBusinessesThisMonth:
          type: integer
      required: [totalBusinesses, activeBusinesses, monthlyRevenue, totalTransactionsToday, newBusinessesThisMonth]

    MonthlyRevenue:
      type: object
      properties:
        month:
          type: string
        revenue:
          type: number
        transactions:
          type: integer
      required: [month, revenue, transactions]

    SectorRevenue:
      type: object
      properties:
        sector:
          type: string
        label:
          type: string
        revenue:
          type: number
        transactions:
          type: integer
      required: [sector, label, revenue, transactions]

    PaymentMethodStat:
      type: object
      properties:
        method:
          type: string
        label:
          type: string
        amount:
          type: number
        percentage:
          type: number
      required: [method, label, amount, percentage]

    RecentActivity:
      type: object
      properties:
        id:
          type: integer
        businessName:
          type: string
        sector:
          type: string
        amount:
          type: number
        method:
          type: string
