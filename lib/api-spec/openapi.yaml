openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: LB Stay Cloud - Multi-sector SaaS platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: businesses
  - name: branches
  - name: superadmin
  - name: clients
  - name: restaurant
  - name: hotel
  - name: beauty
  - name: grocery
  - name: pharmacy
  - name: garage
  - name: fitness
  - name: education
  - name: payments
  - name: notifications
  - name: inventory
  - name: suppliers
  - name: credits
  - name: billing

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── AUTH ────────────────────────────────────────────────
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  # ─── SUPER ADMIN ─────────────────────────────────────────
  /superadmin/stats:
    get:
      operationId: getSuperAdminStats
      tags: [superadmin]
      summary: Global platform stats
      responses:
        "200":
          description: Global stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuperAdminStats"

  /superadmin/revenue-chart:
    get:
      operationId: getSuperAdminRevenueChart
      tags: [superadmin]
      summary: 12-month revenue chart data
      responses:
        "200":
          description: Revenue chart
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyRevenue"

  /superadmin/sector-revenue:
    get:
      operationId: getSuperAdminSectorRevenue
      tags: [superadmin]
      summary: Revenue breakdown by sector
      responses:
        "200":
          description: Sector revenue breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SectorRevenue"

  /superadmin/payment-methods:
    get:
      operationId: getSuperAdminPaymentMethods
      tags: [superadmin]
      summary: Payment method distribution
      responses:
        "200":
          description: Payment methods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentMethodStat"

  /superadmin/recent-activity:
    get:
      operationId: getSuperAdminRecentActivity
      tags: [superadmin]
      summary: Recent transactions across all businesses
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecentActivity"

  # ─── BUSINESSES ──────────────────────────────────────────
  /businesses:
    get:
      operationId: listBusinesses
      tags: [businesses]
      summary: List all businesses
      parameters:
        - name: sector
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of businesses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Business"
    post:
      operationId: createBusiness
      tags: [businesses]
      summary: Create a business
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBusinessBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"

  /businesses/{id}:
    get:
      operationId: getBusiness
      tags: [businesses]
      summary: Get a business
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
    put:
      operationId: updateBusiness
      tags: [businesses]
      summary: Update a business
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBusinessBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"

  /businesses/{id}/stats:
    get:
      operationId: getBusinessStats
      tags: [businesses]
      summary: Get business daily stats
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Business stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessStats"

  # ─── BRANCHES ────────────────────────────────────────────
  /branches:
    get:
      operationId: listBranches
      tags: [branches]
      summary: List branches for a business
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of branches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Branch"
    post:
      operationId: createBranch
      tags: [branches]
      summary: Create a branch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBranchBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Branch"

  # ─── CLIENTS ─────────────────────────────────────────────
  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List clients for a business
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  # ─── PAYMENTS ────────────────────────────────────────────
  /payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: List payments for a business
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [payments]
      summary: Create a payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/stats:
    get:
      operationId: getPaymentStats
      tags: [payments]
      summary: Payment method breakdown
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentStats"

  # ─── RESTAURANT ──────────────────────────────────────────
  /restaurant/products:
    get:
      operationId: listRestaurantProducts
      tags: [restaurant]
      summary: List restaurant menu items
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RestaurantProduct"
    post:
      operationId: createRestaurantProduct
      tags: [restaurant]
      summary: Create a menu item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRestaurantProductBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantProduct"

  /restaurant/products/{id}:
    put:
      operationId: updateRestaurantProduct
      tags: [restaurant]
      summary: Update a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRestaurantProductBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantProduct"
    delete:
      operationId: deleteRestaurantProduct
      tags: [restaurant]
      summary: Delete a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /restaurant/orders:
    get:
      operationId: listRestaurantOrders
      tags: [restaurant]
      summary: List restaurant orders
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RestaurantOrder"
    post:
      operationId: createRestaurantOrder
      tags: [restaurant]
      summary: Create an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRestaurantOrderBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantOrder"

  /restaurant/orders/{id}/status:
    put:
      operationId: updateRestaurantOrderStatus
      tags: [restaurant]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantOrder"

  /restaurant/stats:
    get:
      operationId: getRestaurantStats
      tags: [restaurant]
      summary: Restaurant daily stats and top dishes
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantStats"

  /restaurant/hourly-sales:
    get:
      operationId: getRestaurantHourlySales
      tags: [restaurant]
      summary: Hourly sales chart data
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hourly sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HourlySales"

  # ─── HOTEL ───────────────────────────────────────────────
  /hotel/rooms:
