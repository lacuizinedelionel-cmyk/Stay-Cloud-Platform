                items:
                  $ref: "#/components/schemas/HotelRoom"
    post:
      operationId: createHotelRoom
      tags: [hotel]
      summary: Create a room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHotelRoomBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HotelRoom"

  /hotel/reservations:
    get:
      operationId: listHotelReservations
      tags: [hotel]
      summary: List reservations
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of reservations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HotelReservation"
    post:
      operationId: createHotelReservation
      tags: [hotel]
      summary: Create a reservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHotelReservationBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HotelReservation"

  /hotel/reservations/{id}/checkin:
    post:
      operationId: hotelCheckIn
      tags: [hotel]
      summary: Check in a reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Checked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HotelReservation"

  /hotel/reservations/{id}/checkout:
    post:
      operationId: hotelCheckOut
      tags: [hotel]
      summary: Check out a reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Checked out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HotelReservation"

  /hotel/reservations/{id}/cancel:
    post:
      operationId: cancelHotelReservation
      tags: [hotel]
      summary: Cancel a reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HotelReservation"

  /hotel/stats:
    get:
      operationId: getHotelStats
      tags: [hotel]
      summary: Hotel occupancy stats
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HotelStats"

  # ─── BEAUTY ──────────────────────────────────────────────
  /beauty/services:
    get:
      operationId: listBeautyServices
      tags: [beauty]
      summary: List beauty services
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BeautyService"
    post:
      operationId: createBeautyService
      tags: [beauty]
      summary: Create a service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBeautyServiceBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BeautyService"

  /beauty/staff:
    get:
      operationId: listBeautyStaff
      tags: [beauty]
      summary: List beauty staff
      parameters:
        - name: businessId
          in: query
          required: true
          schema:
