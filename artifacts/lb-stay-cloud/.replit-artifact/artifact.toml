kind = "web"
previewPath = "/"
title = "LB Stay Cloud"
version = "1.0.0"
id = "artifacts/lb-stay-cloud"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25553

[services.development]
run = "pnpm --filter @workspace/lb-stay-cloud run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lb-stay-cloud", "run", "build" ]
publicDir = "artifacts/lb-stay-cloud/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25553"
BASE_PATH = "/"
